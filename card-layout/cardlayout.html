<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap");
      * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
        font-family: "Work Sans", sans-serif;
      }
      section {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      body {
        background-color: white;
      }
      .container {
        margin: 0 auto;
        max-width: 1170px;
      }
      .row {
        display: flex;
        gap: 30px;
        flex-direction: row;
      }
      .card {
        background-color: white;
        border: 2px;
        box-shadow: 0px 1px 10px 0px #0000001a;
        overflow: hidden;
        position: relative;
      }
      .card-content {
        display: flex;
        justify-content: center;
        flex-direction: column;
        align-items: center;
      }
      .heading-name {
        font-size: 20px;
        font-weight: 500;
        line-height: 150%;
        letter-spacing: 0%;
        color: black;
        margin-top: 24px;
      }
      .paragraph {
        font-size: 16px;
        font-weight: 400;
        line-height: 150%;
        color: grey;
        margin-bottom: 15px;
        margin-top: 12px;
      }
      .full-box {
        padding: 0 20px;
      }
      .parent-card-1 {
        display: flex;
        gap: 30px;
      }
      .parent-card-2 {
        display: flex;
        gap: 30px;
      }
      .icons {
        position: absolute;
        top: 37.5px;
        right: -40px;
        transition: all 300ms;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .icon {
        height: 40px;
        width: 40px;
        background-color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: all 600ms ease;
      }
      .card:hover .icons {
        right: 0px;
      }
      .icon:hover svg path {
        fill: white;
        transition: all 800ms ease;
      }
      .icon:hover {
        background-color: #ff5300;
        transition: all 800ms ease;
        transform: translateX(-1px);
      }
      @media (max-width: 320px) {
        .row {
          flex-direction: column;
          gap: 20px;
        }
        .parent-card-1 {
          flex-direction: column;
          gap: 20px;
        }
        .parent-card-2 {
          flex-direction: column;
          gap: 20px;
        }
        .full-box {
          padding: 20px;
        }
      }
      @media (max-width: 375px) {
        .row {
          flex-direction: column;
          gap: 30px;
        }
        .parent-card-1 {
          flex-direction: column;
          gap: 30px;
        }
        .parent-card-2 {
          flex-direction: column;
          gap: 30px;
        }
        .full-box {
          padding: 20px;
        }
      }
      @media (max-width : 425px) {
        .row {
          flex-direction: column;
          gap: 30px;
        }
        .parent-card-1 {
          flex-direction: column;
          gap: 30px;
        }
        .parent-card-2 {
          flex-direction: column;
          gap: 30px;
        }
        .full-box {
          padding: 20px;
        }
      }
      @media (max-width : 768px) {
        .row {
          flex-direction: column;
          gap: 30px;
        }
    
        .full-box {
          padding: 20px;
        }
      }
      @media (max-width : 1024px) {
        .row {
          flex-direction: column;
          gap: 30px;
        }
    
        .full-box {
          padding: 20px;
        }
      }
    </style>
